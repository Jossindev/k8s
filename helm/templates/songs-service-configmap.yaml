apiVersion: v1
kind: ConfigMap
metadata:
  name: songs-service-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "microservices-intro.labels" . | nindent 4 }}
data:
  SONGS_DB_URL: "songs-db"
  SONGS_DB_PORT: "5432"
  SONGS_MS_PORT: "{{ .Values.songsService.containerPort }}"
  ENABLE_EUREKA_CLIENT: "false"
