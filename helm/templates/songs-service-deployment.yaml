apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount.songsService }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: songs-service
  template:
    metadata:
      labels:
        app: songs-service
    spec:
      containers:
        - name: songs-service
          image: {{ .Values.songsService.image }}
          imagePullPolicy: {{ .Values.songsService.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.songsService.containerPort }}
          envFrom:
            - configMapRef:
                name: songs-service-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.songsService.containerPort }}
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.songsService.containerPort }}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.songsService.containerPort }}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: songs-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: songs-service
  ports:
    - port: {{ .Values.songsService.containerPort }}
      targetPort: {{ .Values.songsService.containerPort }}
